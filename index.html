<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="冷蔵庫チャレンジ">
<title>冷蔵庫チャレンジ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; touch-action: manipulation; }
  .container { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 17px; font-weight: 500; color: #1a1a1a; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }
  .day-badge { display: inline-flex; align-items: center; gap: 6px; background: #E1F5EE; color: #0F6E56; font-size: 13px; font-weight: 500; padding: 4px 14px; border-radius: 99px; margin-bottom: 1rem; }
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-bar { height: 5px; background: #e8e8e8; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #5DCAA5; border-radius: 99px; transition: width 0.4s; }
  .progress-label { font-size: 12px; color: #aaa; margin-top: 5px; text-align: right; }
  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .nav-btn { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #555; touch-action: manipulation; }
  .nav-btn:active { background: #f0f0f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .date-label { font-size: 13px; color: #666; }
  .today-tag { display: inline-block; background: #FAEEDA; color: #854F0B; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
  .card { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 1.1rem 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .card-body { font-size: 15px; line-height: 1.8; color: #1a1a1a; white-space: pre-wrap; }
  .copy-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 12px; padding: 10px; font-size: 14px; background: #f7f7f5; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; color: #333; touch-action: manipulation; }
  .copy-btn:active { background: #eee; }
  .full-card { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 1.1rem 1.25rem; margin-bottom: 1rem; }
  .full-preview { font-size: 14px; line-height: 1.9; color: #333; white-space: pre-wrap; background: #f7f7f5; border-radius: 8px; padding: 1rem; margin-top: 0.5rem; }
  .full-copy-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 12px; padding: 13px; font-size: 15px; font-weight: 500; background: #1a1a1a; border: none; border-radius: 10px; cursor: pointer; color: #fff; touch-action: manipulation; }
  .full-copy-btn:active { background: #333; }
  .copy-area { position: fixed; left: -9999px; top: 0; }
  .toast { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0F6E56; color: #fff; padding: 10px 24px; border-radius: 99px; font-size: 14px; z-index: 999; white-space: nowrap; }
  .toast.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>冷蔵庫チャレンジ</h1>
    <p>毎日の投稿をかんたんコピー</p>
  </div>
  <div id="main-content"></div>
</div>
<textarea id="copy-area" class="copy-area" readonly></textarea>
<div id="toast" class="toast">✓ コピーしました！</div>

<script>
var FORM_URL = 'https://forms.gle/Q2dpfBmZp38FDc5i8';

var data = [
  { date: "6/1(月)", challenge: "冷蔵庫を開けてを写真に撮る", message: "心地よさを選んでいくと、気づいたら\u201c楽しい♡\u201dに繋がっていきます🌸" },
  { date: "6/2(火)", challenge: "賞味期限切れを3つ手放す（なければOK）", message: "余白ができると、人生はもっと軽やかに流れはじめます🌿" },
  { date: "6/3(水)", challenge: "なんとなく置いてある調味料を手放す", message: "力を抜いた時こそ、本来の魅力が自然とひらいていきます💐" },
  { date: "6/4(木)", challenge: "冷蔵庫＞自分のレギュラーとイレギュラーを書き出す", message: "「ちゃんとしなきゃ」を手放すたび、心はふわっと軽くなっていきます🕊️" },
  { date: "6/5(金)", challenge: "冷蔵庫＞ゾーン分けをする", message: "今日のあなたが、ふわっと軽やかに過ごせますように🌈" },
  { date: "6/6(土)", challenge: "冷蔵庫＞掃除する（ドアポケット）", message: "頑張るより、心地よさを選ぶ1日にしてみましょう☺️" },
  { date: "6/7(日)", challenge: "冷蔵庫内を掃除する（棚）", message: "あなたの「楽しい♡」を、今日も大切に🌈" },
  { date: "6/8(月)", challenge: "冷蔵庫の収納を完成させる（収納グッズがない場合は買いに行く）", message: "\u201cこれくらいでいい♡\u201dが、心を軽くしてくれます💫" },
  { date: "6/9(火)", challenge: "ラベリングをやってみる", message: "ゆるめることで、本来の魅力はもっと輝いていきます✨" },
  { date: "6/10(水)", challenge: "野菜室＞写真にとる", message: "あなたらしいペースで、大丈夫☺️" },
  { date: "6/11(木)", challenge: "野菜室＞使えない野菜を処分する", message: "今日も、自分にやさしい選択を♡🌿" },
  { date: "6/12(金)", challenge: "野菜室＞レギュラー品とイレギュラーを書き出してみる", message: "少し力を抜くだけで、見える景色は変わっていきます🕊️" },
  { date: "6/13(土)", challenge: "野菜室＞掃除をする", message: "頑張らないことで、うまくいくこともたくさんあります🌸" },
  { date: "6/14(日)", challenge: "野菜室＞ざっくりゾーン分けをし収納する", message: "今日の自分に必要なものを、やさしく選んでみてください💐" },
  { date: "6/15(月)", challenge: "冷凍庫＞写真をとる", message: "\u201cちゃんと\u201dより、\u201cなんかいい♡\u201dを大切に☺️" },
  { date: "6/16(火)", challenge: "冷凍庫＞不要なものを処分する", message: "心がほっとする選択を、今日もひとつ♡🌈" },
  { date: "6/17(水)", challenge: "冷凍庫＞ざっくりとゾーン分けし収納する", message: "ゆるっと過ごすくらいが、ちょうどいい日もあります🌿" },
  { date: "6/18(木)", challenge: "完成した冷蔵庫、野菜室、冷凍庫の写真を撮ってみる", message: "軽やかさは、安心した心から生まれていきます💫" },
  { date: "6/19(金)", challenge: "買い物＞自分のレギュラーアイテムと量を意識する", message: "あなたの毎日に、やさしい余白が広がっていきますように🕊️" },
  { date: "6/20(土)", challenge: "定位置をキープする", message: "今日もあなたらしく、ふわっと軽やかな1日を🌈" },
  { date: "6/21(日)", challenge: "写真を見返し、変化したことを3つ書く", message: "心地よさを選んでいくと、自然と\u201c楽しい♡\u201dに繋がっていきます🌸" }
];

function getDayIndex() {
  // 日本時間で計算
  var now = new Date();
  var jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
  var y = jst.getUTCFullYear();
  var m = jst.getUTCMonth();
  var d = jst.getUTCDate();
  var today = new Date(Date.UTC(y, m, d));
  var start = new Date(Date.UTC(2025, 5, 1)); // 2025-06-01
  var diff = Math.floor((today - start) / (1000*60*60*24));
  return Math.max(0, Math.min(diff, 20));
}

function buildFullText(idx) {
  var d = data[idx];
  return "【今日の冷蔵庫チャレンジ】\n①" + d.challenge + "\n\n▼アウトプットフォーム\n（コンプリート賞の対象です♡）\n" + FORM_URL + "\n\n②" + d.message + "\n\n完了したら、\nリアクションで教えてね〜🎶";
}

var currentDay = getDayIndex();

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function copyText(text) {
  var ta = document.getElementById('copy-area');
  ta.value = text;
  ta.focus();
  ta.select();
  ta.setSelectionRange(0, 99999);
  var ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  if (ok) { showToast(); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showToast).catch(function() {
      alert('テキストを長押しして手動でコピーしてください。');
    });
  }
}

function render() {
  var idx = currentDay;
  var d = data[idx];
  var fullText = buildFullText(idx);
  var progress = Math.round(((idx+1)/21)*100);
  var isToday = idx === getDayIndex();
  var todayTag = isToday ? '<span class="today-tag">今日</span>' : '';

  var html = '';
  html += '<div class="nav-row">';
  html += '<button class="nav-btn" onclick="prevDay()"' + (idx===0?' disabled':'') + '>← 前の日</button>';
  html += '<span class="date-label">' + d.date + todayTag + '</span>';
  html += '<button class="nav-btn" onclick="nextDay()"' + (idx===20?' disabled':'') + '>次の日 →</button>';
  html += '</div>';
  html += '<div class="day-badge">' + (idx+1) + '日目 / 21日間</div>';
  html += '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div><div class="progress-label">' + progress + '% 完了</div></div>';
  html += '<div class="card"><div class="card-label">今日のチャレンジ ①</div><div class="card-body">' + d.challenge + '</div><button class="copy-btn" onclick="copyChallenge()">📋 ①をコピー</button></div>';
  html += '<div class="card"><div class="card-label">今日のメッセージ ②</div><div class="card-body">' + d.message + '</div><button class="copy-btn" onclick="copyMessage()">📋 ②をコピー</button></div>';
  html += '<div class="full-card"><div class="card-label">LINE投稿用・全文</div><div class="full-preview">' + fullText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') + '</div><button class="full-copy-btn" onclick="copyFull()">📲 全文をコピーしてLINEに貼る</button></div>';

  document.getElementById('main-content').innerHTML = html;
  window._cur_challenge = '①' + d.challenge;
  window._cur_message = d.message;
  window._cur_full = fullText;
}

function copyChallenge() { copyText(window._cur_challenge); }
function copyMessage() { copyText(window._cur_message); }
function copyFull() { copyText(window._cur_full); }
function prevDay() { if(currentDay>0){currentDay--;render();} }
function nextDay() { if(currentDay<20){currentDay++;render();} }

render();
</script>
</body>
</html>
